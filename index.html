<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    * {
        font-family: 'Georgia', serif;
        box-sizing: border-box;
    }

    body {
        background-color: white;
        color: #1a1a2e;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    h1 {
        color: #165791;
        border-bottom: 2px solid #165791;
        padding-bottom: 10px;
    }

    h2 {
        color: #165791;
        font-size: 1.2rem;
    }

    input, select {
        padding: 8px 12px;
        border: 1px solid #c5d5e8;
        border-radius: 6px;
        font-size: 0.95rem;
        margin-right: 8px;
        margin-bottom: 8px;
    }

    button {
        padding: 8px 16px;
        background-color: #165791;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.95rem;
    }

    button:hover {
        background-color: #0e3d6b;
    }

    div {
        padding: 16px 20px;
        margin-bottom: 0;
        border-bottom: 1px solid #165791;
    }

    ul {
        padding-left: 20px;
    }

    li {
        padding: 6px 0;
    }

    #spending-chart {
        max-width: 400px;
        max-height: 400px;
        margin: 0 auto;
        display: block;
    }

    #income-display, #total-expenses, #net-savings {
        font-size: 1.1rem;
        font-weight: bold;
        color: #165791;
    }

    #month-selector {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    #monthly-chart {
        max-width: 600px;
        max-height: 300px;
        margin: 0 auto;
        display: block;
    }
</style>
</head>
<body>
    
    <h1>Finance Manager</h1>

    <!-- Month Selector -->
    <div id="month-selector">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <h2 id="current-month-display">May 2026</h2>
        <button onclick="changeMonth(1)">&#8594;</button>
    </div>

    <!-- Entering Income -->
    <div id="income-section">
     <h2>Monthly Income</h2>
     <input type="number" id="income-input" placeholder="Enter monthly income" />
     <button onclick="setIncome()"> Set Income </button>
     <p id="income-display"> Income: $0</p>

    </div>

    <!-- Adding Transactions -->
     <div id="transaction-section">
        <h2> Add Transaction</h2>
        <input type ="text" id="description-input" placeholder="Description" />
        <input type ="number" id="amount-input" placeholder="Amount" />
        <select id="spending-type">
            <option value="Housing">Housing</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="HealthCare">Healthcare</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Loans">Student Loans</option>
            <option value="Other">Other</option>
        </select>
        <button onclick="addTransaction()">Add Transaction</button>
     </div>

     <!-- Displaying Transactions -->
        <div id="transactions-display">
            <h2>Transactions</h2>
            <ul id="transaction-list"> </ul>
        </div>
    
        <!-- Summary -->
         <div id="summary-section">
            <h2>Summary</h2>
            <p id="total-expenses"> Total Expenses: $0</p>
            <p id="net-savings"> Net Savings: $0</p>
        </div>

        <!-- Chart -->
         <div id="chart-section">
            <h2>Spending Breakdown</h2>
            <canvas id="spending-chart"></canvas>
         </div>

        <!-- Monthly Overview -->
        <div id="monthly-overview-section">
            <h2>Monthly Overview</h2>
            <canvas id="monthly-chart"></canvas>
        </div>

    <script>
        let income = 0;
        let transactions = [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        const monthNames = ["January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"];

        function getMonthKey() {
            return monthNames[currentMonth] + "_" + currentYear;
        }

        function updateMonthDisplay() {
            document.getElementById("current-month-display").textContent = monthNames[currentMonth] + " " + currentYear;
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            income = 0;
            transactions = [];
            updateMonthDisplay();
            loadFromLocalStorage();
            updateMonthlyChart();
        }

        function setIncome() {
            income = parseFloat(document.getElementById("income-input").value);
            document.getElementById("income-display").innerText = "Income: $" + income;
            updateSummary();
            saveToLocalStorage();
        }

        function updateSummary() {
            let totalExpenses = 0;
            for (let i = 0; i < transactions.length; i++) {
                totalExpenses += transactions[i].amount;
            }
            let netSavings = income - totalExpenses;
            document.getElementById("total-expenses").textContent = "Total Expenses: $" + totalExpenses;
            document.getElementById("net-savings").textContent = "Net Savings: $" + netSavings;
        }

        function addTransaction() {
            let description = document.getElementById("description-input").value;
            let amount = parseFloat(document.getElementById("amount-input").value);
            let category = document.getElementById("spending-type").value;

            if (description === "" || isNaN(amount) || amount <= 0) {
                alert("Please enter valid values for all fields.");
                return;
            }

            let transaction = {
                description: description,
                amount: amount,
                category: category
            };
            transactions.push(transaction);
            displayTransactions();
            updateSummary();
            updateChart();

            document.getElementById("description-input").value = "";
            document.getElementById("amount-input").value = "";
            saveToLocalStorage();
            updateMonthlyChart();
        }

        function displayTransactions() {
            let transactionList = document.getElementById("transaction-list");
            transactionList.innerHTML = "";

            for (let i = 0; i < transactions.length; i++) {
                let item = document.createElement("li");
                item.textContent = transactions[i].description + ": $" + transactions[i].amount + " (" + transactions[i].category + ")";
                
                let deleteBtn = document.createElement("button");
                deleteBtn.textContent = "Delete";
                deleteBtn.style.marginLeft = "10px";
                deleteBtn.style.backgroundColor = "#c0392b";
                deleteBtn.style.padding = "2px 8px";
                deleteBtn.style.fontSize = "0.8rem";
                deleteBtn.onclick = function() {
                    deleteTransaction(i);
                };

                item.appendChild(deleteBtn);
                transactionList.appendChild(item);
            }
        }

        function deleteTransaction(index) {
            transactions.splice(index, 1);
            displayTransactions();
            updateSummary();
            updateChart();
            updateMonthlyChart();
            saveToLocalStorage();
        }

        function updateChart() {
            let categoryTotals = {};

            for (let i = 0; i < transactions.length; i++) {
                let cat = transactions[i].category;
                if (categoryTotals[cat] === undefined) {
                    categoryTotals[cat] = 0;
                }
                categoryTotals[cat] += transactions[i].amount;
            }

            let labels = Object.keys(categoryTotals);
            let data = Object.values(categoryTotals);

            if (window.myChart instanceof Chart) {
                window.myChart.destroy();
            }

            let ctx = document.getElementById("spending-chart").getContext("2d");
            window.myChart = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: [
                            "#FF6384", "#36A2EB", "#FFCE56",
                            "#4BC0C0", "#9966FF", "#FF9F40",
                            "#C9CBCF", "#7BC8A4"
                        ]
                    }]
                }
            });
        }

        function saveToLocalStorage() {
            let key = getMonthKey();
            localStorage.setItem("transactions_" + key, JSON.stringify(transactions));
            localStorage.setItem("income_" + key, income);
        }

        function loadFromLocalStorage() {
            let key = getMonthKey();
            let savedIncome = localStorage.getItem("income_" + key);
            let savedTransactions = localStorage.getItem("transactions_" + key);

            income = savedIncome !== null ? parseFloat(savedIncome) : 0;
            transactions = savedTransactions !== null ? JSON.parse(savedTransactions) : [];

            document.getElementById("income-display").textContent = "Income: $" + income;
            document.getElementById("income-input").value = "";
            displayTransactions();
            updateChart();
            updateSummary();
        }

        function updateMonthlyChart() {
            let labels = [];
            let spendingData = [];
            let savingsData = [];

            for (let i = 5; i >= 0; i--) {
                let m = currentMonth - i;
                let y = currentYear;
                if (m < 0) {
                    m += 12;
                    y--;
                }
                let key = monthNames[m] + "_" + y;
                let savedIncome = localStorage.getItem("income_" + key);
                let savedTransactions = localStorage.getItem("transactions_" + key);

                let monthIncome = savedIncome !== null ? parseFloat(savedIncome) : 0;
                let monthTransactions = savedTransactions !== null ? JSON.parse(savedTransactions) : [];

                let totalSpending = 0;
                for (let j = 0; j < monthTransactions.length; j++) {
                    totalSpending += monthTransactions[j].amount;
                }

                labels.push(monthNames[m].slice(0, 3) + " " + y);
                spendingData.push(totalSpending);
                savingsData.push(monthIncome - totalSpending);
            }

            if (window.monthlyChart instanceof Chart) {
                window.monthlyChart.destroy();
            }

            let ctx = document.getElementById("monthly-chart").getContext("2d");
            window.monthlyChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "Spending",
                            data: spendingData,
                            backgroundColor: "#FF6384"
                        },
                        {
                            label: "Savings",
                            data: savingsData,
                            backgroundColor: "#165791"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        updateMonthDisplay();
        loadFromLocalStorage();
        updateMonthlyChart();

    </script>

</body>
</html>
