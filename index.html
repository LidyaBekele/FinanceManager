<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <h1>Finance Manager</h1>

    <!-- Entering Income -->
    <div id="income-section">
     <h2>Monthly Income</h2>
     <input type="number" id="income-input" placeholder="Enter monthly income" />
     <button onclick="setIncome()"> Set Income </button>
     <p id="income-display"> Income: $0</p>

    </div>

    <!-- Adding Transactions -->
     <div id="transaction-section">
        <h2> Add Transaction</h2>
        <input type ="text" id="description-input" placeholder="Description" />
        <input type ="number" id="amount-input" placeholder="Amount" />
        <select id="spending-type">
            <option value="Housing">Housing</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="HealthCare">Healthcare</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Loans">Student Loans</option>
            <option value="Other">Other</option>
        </select>
        <button onclick="addTransaction()">Add Transaction</button>
     </div>

     <!-- Displaying Transactions -->
        <div id="transactions-display">
            <h2>Transactions</h2>
            <ul id="transaction-list"> </ul>
        </div>
    
        <!-- Summary -->
         <div id="summary-section">
            <h2>Summary</h2>
            <p id="total-expenses"> Total Expenses: $0</p>
            <p id="net-savings"> Net Savings: $0</p>
        </div>

        <!-- Chart -->
         <div id="chart-section">
            <h2>Spending Breakdown</h2>
            <canvas id="spending-chart"></canvas>
         </div>

</body>
</html>
