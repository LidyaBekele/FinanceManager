<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <h1>Finance Manager</h1>

    <!-- Entering Income -->
    <div id="income-section">
     <h2>Monthly Income</h2>
     <input type="number" id="income-input" placeholder="Enter monthly income" />
     <button onclick="setIncome()"> Set Income </button>
     <p id="income-display"> Income: $0</p>

    </div>

    <!-- Adding Transactions -->
     <div id="transaction-section">
        <h2> Add Transaction</h2>
        <input type ="text" id="description-input" placeholder="Description" />
        <input type ="number" id="amount-input" placeholder="Amount" />
        <select id="spending-type">
            <option value="Housing">Housing</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="HealthCare">Healthcare</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Loans">Student Loans</option>
            <option value="Other">Other</option>
        </select>
        <button onclick="addTransaction()">Add Transaction</button>
     </div>

     <!-- Displaying Transactions -->
        <div id="transactions-display">
            <h2>Transactions</h2>
            <ul id="transaction-list"> </ul>
        </div>
    
        <!-- Summary -->
         <div id="summary-section">
            <h2>Summary</h2>
            <p id="total-expenses"> Total Expenses: $0</p>
            <p id="net-savings"> Net Savings: $0</p>
        </div>

        <!-- Chart -->
         <div id="chart-section">
            <h2>Spending Breakdown</h2>
            <canvas id="spending-chart"></canvas>
         </div>

    <script>
        let income = 0;
        let transactions = [];

        function setIncome() {
            let income = parseFloat(document.getElementById("income-input").value);
            document.getElementById("income-display").innerText = "Income: $" + income;
            updateSummary();
        }

        function updateSummary() {
            let totalExpenses = 0;
            for(let i=0; i<transactions.length; i++) {
                totalExpenses += transactions[i].amount;
            }
            let netSavings = income - totalExpenses;
            document.getElementById("total-expenses").textContent = "Total Expenses: $" + totalExpenses;
            document.getElementById("net-savings").textContent = "Net Savings: $" + netSavings;
        }
        
        function addTransaction() {
            let description = document.getElementById("description-input").value;
            let amount = parseFloat(document.getElementById("amount-input").value);
            let category = document.getElementById("spending-type").value;
            
            if(description === "" || isNaN(amount) || amount <= 0) {
                alert("Please enter valid values for all fields.");
                return;
            }

            let transaction = {
                description: description,
                amount: amount,
                category: category
            };
            transactions.push(transaction);
            displayTransactions();
            updateSummary();
            updateChart();

            document.getElementById("description-input").value = "";
            document.getElementById("amount-input").value = "";
        }

        function displayTransactions() {
            let transactionList = document.getElementById("transaction-list");
            transactionList.innerHTML = "";

            for(let i=0; i<transactions.length; i++) {
                let item = document.createElement("li");
                item.textContent = transactions[i].description + ": $" + transactions[i].amount + " (" + transactions[i].category + ")";
                transactionList.appendChild(item);
            }
        }
        function updateChart() {
            let categoryTotals = {};

            for (let i = 0; i < transactions.length; i++) {
                let cat = transactions[i].category;
                if (categoryTotals[cat] === undefined) {
                    categoryTotals[cat] = 0;
                }
                categoryTotals[cat] += transactions[i].amount;
            }

            let labels = Object.keys(categoryTotals);
            let data = Object.values(categoryTotals);

            if (window.myChart instanceof Chart) {
                window.myChart.destroy();
            }

            let ctx = document.getElementById("spending-chart").getContext("2d");
            window.myChart = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: [
                            "#FF6384", "#36A2EB", "#FFCE56",
                            "#4BC0C0", "#9966FF", "#FF9F40",
                            "#C9CBCF", "#7BC8A4"
                        ]
                    }]
                }
            });
        }

    
    </script>

</body>
</html>
